<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Spoken English Teacher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --bg:#040404;
    --surface:#0f0f0f;
    --surface-2:#181818;
    --gold:#e6b84c;
    --gold-dim:#8a6d24;
    --gold-soft:rgba(230,184,76,0.12);
    --text:#f4ecd8;
    --muted:#8a8272;
    --danger:#ff5d73;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    height:100vh;
    display:flex;
    overflow:hidden;
  }

  /* ---------- Sidebar ---------- */
  #overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.55);
    z-index:20;display:none;
  }
  #overlay.show{display:block;}
  #sidebar{
    position:fixed;top:0;left:0;bottom:0;
    width:280px;
    background:linear-gradient(180deg,#0c0c0c,#050505);
    border-right:1px solid var(--gold-soft);
    z-index:30;
    display:flex;flex-direction:column;
    transform:translateX(-100%);
    transition:transform .28s ease;
  }
  #sidebar.open{transform:translateX(0);}
  .sidebar-header{
    padding:18px 16px 12px;
    font-family:'Poppins',sans-serif;
    font-weight:700;
    font-size:16px;
    color:var(--gold);
    border-bottom:1px solid rgba(230,184,76,0.1);
    display:flex;align-items:center;justify-content:space-between;
  }
  .new-chat-btn{
    margin:14px 16px;
    padding:11px 14px;
    background:linear-gradient(135deg,var(--gold),var(--gold-dim));
    color:#1a1400;
    font-weight:600;
    font-size:14px;
    border:none;border-radius:10px;
    cursor:pointer;
    display:flex;align-items:center;gap:8px;justify-content:center;
  }
  .sessions-list{
    flex:1;
    overflow-y:auto;
    padding:0 10px;
    display:flex;flex-direction:column;gap:4px;
  }
  .session-item{
    padding:11px 12px;
    border-radius:8px;
    font-size:13.5px;
    color:#cfc7b5;
    cursor:pointer;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    border:1px solid transparent;
  }
  .session-item:hover{background:rgba(255,255,255,0.04);}
  .session-item.active{
    background:var(--gold-soft);
    border-color:rgba(230,184,76,0.35);
    color:var(--gold);
  }
  .sidebar-footer{
    padding:14px 16px;
    border-top:1px solid rgba(230,184,76,0.1);
    font-size:13px;
  }
  .profile-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .profile-row img{width:30px;height:30px;border-radius:50%;border:1px solid var(--gold-dim);}
  .profile-name{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .auth-btn{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid var(--gold-dim);
    background:transparent;
    color:var(--gold);
    font-size:13px;
    font-weight:600;
    cursor:pointer;
  }
  .auth-hint{color:var(--muted);font-size:11.5px;line-height:1.4;margin-bottom:8px;}

  /* ---------- Main ---------- */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    height:100vh;
    min-width:0;
  }
  header{
    background:linear-gradient(120deg,#0c0c0c,#161616);
    padding:16px 18px;
    display:flex;align-items:center;gap:12px;
    border-bottom:1px solid var(--gold-soft);
    position:relative;z-index:10;
  }
  .hamburger{
    background:none;border:1px solid var(--gold-dim);color:var(--gold);
    width:36px;height:36px;border-radius:8px;font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .header-title{flex:1;text-align:center;font-family:'Poppins',sans-serif;font-weight:700;font-size:18px;}
  .header-title .flag{margin-right:6px;}
  .header-title .sub{display:block;font-family:'Inter',sans-serif;font-weight:400;font-size:11.5px;color:var(--muted);margin-top:3px;}
  .header-spacer{width:36px;flex-shrink:0;}

  .chat-container{
    flex:1;overflow-y:auto;padding:20px 16px;
    display:flex;flex-direction:column;gap:14px;
    background:radial-gradient(circle at 50% 0%, rgba(230,184,76,0.04), transparent 55%), var(--bg);
  }
  .message{
    max-width:82%;padding:13px 17px;border-radius:18px;
    font-size:15.5px;line-height:1.55;
    box-shadow:0 4px 14px rgba(0,0,0,0.35);
    animation:rise .25s ease;
  }
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .user{
    background:linear-gradient(135deg,var(--gold),#c99a2e);
    color:#1a1400;
    align-self:flex-end;
    border-bottom-right-radius:4px;
    font-weight:500;
  }
  .ai{
    background:var(--surface-2);
    color:#ece4d2;
    align-self:flex-start;
    border-bottom-left-radius:4px;
    border:1px solid var(--gold-soft);
  }

  .controls{
    background:var(--surface);
    padding:16px 20px 22px;
    display:flex;flex-direction:column;align-items:center;gap:12px;
    border-top:1px solid var(--gold-soft);
    box-shadow:0 -8px 30px rgba(0,0,0,0.5);
    position:relative;z-index:10;
  }
  .text-row{width:100%;display:flex;gap:8px;align-items:center;}
  .text-input{
    flex:1;background:var(--surface-2);
    border:1px solid rgba(230,184,76,0.18);
    color:var(--text);font-family:'Inter',sans-serif;font-size:15px;
    padding:12px 16px;border-radius:22px;outline:none;
    transition:border-color .2s ease;
  }
  .text-input:focus{border-color:var(--gold);}
  .text-input::placeholder{color:var(--muted);}
  .send-btn{
    width:44px;height:44px;border-radius:50%;border:none;
    background:linear-gradient(135deg,var(--gold),var(--gold-dim));
    color:#1a1400;font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:0 4px 12px rgba(230,184,76,0.3);
    transition:transform .15s ease;
  }
  .send-btn:active{transform:scale(0.9);}
  .send-btn:disabled{opacity:0.4;cursor:default;}

  .divider-row{display:flex;align-items:center;gap:10px;width:100%;color:var(--muted);font-size:12px;}
  .divider-row::before,.divider-row::after{content:"";flex:1;height:1px;background:rgba(230,184,76,0.1);}

  .record-btn-wrap{position:relative;width:100px;height:100px;display:flex;align-items:center;justify-content:center;}
  .ring{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(230,184,76,0.35);opacity:0;transform:scale(0.85);}
  .record-btn.recording ~ .ring{opacity:1;}
  .ring1{animation:ripple 1.8s ease-out infinite;}
  .ring2{animation:ripple 1.8s ease-out infinite;animation-delay:.6s;}
  @keyframes ripple{0%{opacity:.55;transform:scale(0.8);}100%{opacity:0;transform:scale(1.5);}}
  .record-btn{
    width:78px;height:78px;border-radius:50%;border:none;cursor:pointer;font-size:30px;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--gold),var(--gold-dim));
    box-shadow:0 8px 22px rgba(230,184,76,0.3);
    transition:transform .2s ease, box-shadow .2s ease, background .3s ease;
    position:relative;z-index:2;
  }
  .record-btn:active{transform:scale(0.93);}
  .record-btn.recording{
    background:linear-gradient(135deg,var(--danger),#c73a52);
    box-shadow:0 8px 26px rgba(255,93,115,0.4);
  }
  .status{font-size:13.5px;color:var(--muted);font-weight:500;text-align:center;min-height:18px;}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:rgba(230,184,76,0.15);border-radius:10px;}

  @media (prefers-reduced-motion: reduce){.ring1,.ring2,.message{animation:none;}}
</style>
</head>
<body>

  <div id="overlay" onclick="closeSidebar()"></div>

  <aside id="sidebar">
    <div class="sidebar-header">
      <span>💬 চ্যাট হিস্ট্রি</span>
      <button class="hamburger" onclick="closeSidebar()">✕</button>
    </div>
    <button class="new-chat-btn" onclick="createNewSession()">+ নতুন চ্যাট</button>
    <div class="sessions-list" id="sessionsList"></div>
    <div class="sidebar-footer" id="sidebarFooter">
      <div class="auth-hint">চ্যাট হিস্ট্রি সংরক্ষণ করতে Google দিয়ে সাইন-ইন করুন।</div>
      <button class="auth-btn" id="authBtn" onclick="handleAuthClick()">Google দিয়ে সাইন-ইন</button>
    </div>
  </aside>

  <div class="main">
    <header>
      <button class="hamburger" onclick="openSidebar()">☰</button>
      <div class="header-title">
        <span class="flag">🇧🇩</span>AI Spoken English Teacher
        <span class="sub">কথা বলে শিখুন ইংরেজি</span>
      </div>
      <div class="header-spacer"></div>
    </header>

    <div class="chat-container" id="chatContainer"></div>

    <div class="controls">
      <div class="text-row">
        <input type="text" class="text-input" id="textInput" placeholder="এখানে ইংরেজিতে লিখুন..." autocomplete="off">
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
      <div class="divider-row">অথবা</div>
      <div class="record-btn-wrap">
        <div class="ring ring1"></div>
        <div class="ring ring2"></div>
        <button class="record-btn" id="recordBtn">🎤</button>
      </div>
      <div class="status" id="statusText">লিখুন অথবা মাইকে বলুন...</div>
    </div>
  </div>

<script>
  /* ============ CONFIG ============ */
  const BACKEND_URL = "https://ai-teacher-backend-otc2.onrender.com";
  const GOOGLE_CLIENT_ID = "691037137044-04nqdsafm7k46pvvaftrcsadhe2qbium.apps.googleusercontent.com";
  const DRIVE_SCOPES = "openid email profile https://www.googleapis.com/auth/drive.appdata";
  const DRIVE_FILE_NAME = "spoken_english_teacher_data.json";
  const GREETING = "হ্যালো! আমি তোমার স্পোকেন ইংলিশ টিচার। নিচের মাইক বাটনে ক্লিক করে অথবা লিখে আমার সাথে ইংরেজিতে কথা বলা শুরু করো। ভুল হলে আমি বাংলায় বুঝিয়ে দেব! 😊";

  /* ============ DOM ============ */
  const recordBtn = document.getElementById('recordBtn');
  const statusText = document.getElementById('statusText');
  const chatContainer = document.getElementById('chatContainer');
  const textInput = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const sessionsListEl = document.getElementById('sessionsList');
  const sidebarFooter = document.getElementById('sidebarFooter');

  /* ============ STATE ============ */
  let mediaRecorder, chunks = [], isRecording = false;
  let accessToken = null;
  let driveFileId = null;
  let userProfile = null;
  let sessions = [];
  let currentSessionId = null;
  let saveTimer = null;
  let tokenClient = null;

  /* ============ SIDEBAR TOGGLE ============ */
  function openSidebar(){ sidebar.classList.add('open'); overlay.classList.add('show'); }
  function closeSidebar(){ sidebar.classList.remove('open'); overlay.classList.remove('show'); }

  /* ============ SESSIONS (local model) ============ */
  function blankSession(){
    return { id: 'sess_' + Date.now(), title: 'নতুন চ্যাট', createdAt: Date.now(),
             messages: [{ sender: 'ai', text: GREETING }] };
  }

  function createNewSession(){
    const s = blankSession();
    sessions.unshift(s);
    currentSessionId = s.id;
    renderSessionsList();
    renderChat();
    scheduleSave();
    closeSidebar();
  }

  function getCurrentSession(){
    return sessions.find(s => s.id === currentSessionId);
  }

  function selectSession(id){
    currentSessionId = id;
    renderChat();
    renderSessionsList();
    closeSidebar();
  }

  function renderSessionsList(){
    sessionsListEl.innerHTML = '';
    sessions.forEach(s => {
      const div = document.createElement('div');
      div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
      div.textContent = s.title;
      div.onclick = () => selectSession(s.id);
      sessionsListEl.appendChild(div);
    });
  }

  function renderChat(){
    chatContainer.innerHTML = '';
    const s = getCurrentSession();
    if (!s) return;
    s.messages.forEach(m => appendMessageDOM(m.text, m.sender));
  }

  function appendMessageDOM(text, sender){
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message', sender);
    msgDiv.textContent = text;
    chatContainer.appendChild(msgDiv);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function appendMessage(text, sender){
    const s = getCurrentSession();
    if (!s) return;
    s.messages.push({ sender, text });
    if (sender === 'user' && s.title === 'নতুন চ্যাট'){
      s.title = text.length > 28 ? text.slice(0, 28) + '…' : text;
      renderSessionsList();
    }
    appendMessageDOM(text, sender);
    scheduleSave();
  }

  /* ============ RECORD / TEXT SEND (unchanged core logic) ============ */
  recordBtn.addEventListener('click', async () => {
    if (!isRecording) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = async () => {
          const blob = new Blob(chunks, { type: 'audio/wav' });
          const reader = new FileReader();
          reader.readAsDataURL(blob);
          reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1];
            await sendAudioToAI(base64Audio);
          };
          stream.getTracks().forEach(track => track.stop());
        };
        mediaRecorder.start();
        isRecording = true;
        recordBtn.textContent = "🛑";
        recordBtn.classList.add('recording');
        statusText.textContent = "শুনছি... ইংরেজিতে কথা বলা শেষ করে বাটনে আবার চাপুন।";
      } catch (err) {
        alert("মাইক্রোফোন অ্যাক্সেস পাওয়া যায়নি!");
        console.error(err);
      }
    } else {
      mediaRecorder.stop();
      isRecording = false;
      recordBtn.textContent = "⏳";
      recordBtn.classList.remove('recording');
      statusText.textContent = "AI শিক্ষক চিন্তা করছেন...";
    }
  });

  sendBtn.addEventListener('click', sendTypedMessage);
  textInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendTypedMessage(); });

  function authHeaders(){
    const headers = { 'Content-Type': 'application/json' };
    if (accessToken) headers['Authorization'] = `Bearer ${accessToken}`;
    return headers;
  }

  async function handleErrorResponse(response){
    let detail = "সার্ভার থেকে সঠিক রেসপন্স আসেনি।";
    try { const err = await response.json(); if (err.detail) detail = err.detail; } catch(e){}
    alert(detail);
  }

  async function sendTypedMessage(){
    const text = textInput.value.trim();
    if (!text) return;
    appendMessage(text, 'user');
    textInput.value = "";
    sendBtn.disabled = true;
    statusText.textContent = "AI শিক্ষক চিন্তা করছেন...";
    try {
      const response = await fetch(`${BACKEND_URL}/api/chat`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({
          text,
          user_name: userProfile ? userProfile.name : undefined,
          user_picture: userProfile ? userProfile.picture : undefined
        })
      });
      if (!response.ok) { await handleErrorResponse(response); return; }
      const data = await response.json();
      if (data.success) {
        appendMessage(data.ai_response, 'ai');
        speakText(data.ai_response);
      } else {
        alert("সার্ভার থেকে সঠিক রেসপন্স আসেনি।");
      }
    } catch (error) {
      console.error(error);
      alert("সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না।");
    } finally {
      sendBtn.disabled = false;
      statusText.textContent = "লিখুন অথবা মাইকে বলুন...";
    }
  }

  async function sendAudioToAI(base64Audio){
    try {
      const response = await fetch(`${BACKEND_URL}/api/chat`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({
          audio_base64: base64Audio,
          user_name: userProfile ? userProfile.name : undefined,
          user_picture: userProfile ? userProfile.picture : undefined
        })
      });
      if (!response.ok) { await handleErrorResponse(response); return; }
      const data = await response.json();
      if (data.success) {
        appendMessage(data.user_said, 'user');
        appendMessage(data.ai_response, 'ai');
        speakText(data.ai_response);
      } else {
        alert("সার্ভার থেকে সঠিক রেসপন্স আসেনি।");
      }
    } catch (error) {
      console.error(error);
      alert("সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না।");
    } finally {
      recordBtn.textContent = "🎤";
      statusText.textContent = "লিখুন অথবা মাইকে বলুন...";
    }
  }

  function speakText(fullText){
    const englishParts = fullText.match(/\[(.*?)\]/);
    const conversationPart = fullText.includes(']') ? fullText.split(']').pop() : fullText;
    let voiceText = "";
    if (englishParts) voiceText += `The correct sentence is: ${englishParts[1]}. `;
    voiceText += conversationPart;
    const msg = new SpeechSynthesisUtterance(voiceText);
    msg.lang = 'en-US';
    window.speechSynthesis.speak(msg);
  }

  /* ============ GOOGLE SIGN-IN + DRIVE SYNC ============ */
  window.onload = () => {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: DRIVE_SCOPES,
      callback: handleTokenResponse
    });

    const savedToken = localStorage.getItem('gt_access_token');
    const savedExpiry = parseInt(localStorage.getItem('gt_token_expiry') || '0', 10);

    if (savedToken && Date.now() < savedExpiry) {
      accessToken = savedToken;
      afterAuth();
    } else if (localStorage.getItem('ai_teacher_signed_in') === 'true') {
      // try silent re-auth using existing Google session
      try {
        tokenClient.requestAccessToken({ prompt: '' });
      } catch (e) {
        startGuestMode();
      }
    } else {
      startGuestMode();
    }
  };

  function handleAuthClick(){
    tokenClient.requestAccessToken({ prompt: 'consent' });
  }

  function handleTokenResponse(resp){
    if (resp.error) { console.error(resp); startGuestMode(); return; }
    accessToken = resp.access_token;
    const expiresInMs = (resp.expires_in || 3500) * 1000;
    localStorage.setItem('gt_access_token', accessToken);
    localStorage.setItem('gt_token_expiry', String(Date.now() + expiresInMs - 60000));
    localStorage.setItem('ai_teacher_signed_in', 'true');
    afterAuth();
  }

  async function afterAuth(){
    try {
      await fetchUserProfile();
      renderSidebarFooterSignedIn();
      await ensureDriveFile();
      await loadSessionsFromDrive();
    } catch (e) {
      console.error('Auth/Drive error', e);
      startGuestMode();
    }
  }

  function startGuestMode(){
    renderSidebarFooterSignedOut();
    if (sessions.length === 0) {
      const s = blankSession();
      sessions = [s];
      currentSessionId = s.id;
    }
    renderSessionsList();
    renderChat();
  }

  async function fetchUserProfile(){
    const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    userProfile = await res.json();
  }

  function renderSidebarFooterSignedIn(){
    sidebarFooter.innerHTML = `
      <div class="profile-row">
        <img src="${userProfile.picture || ''}" alt="">
        <div class="profile-name">${userProfile.name || userProfile.email || 'ব্যবহারকারী'}</div>
      </div>
      <button class="auth-btn" onclick="signOut()">সাইন-আউট</button>
    `;
  }

  function renderSidebarFooterSignedOut(){
    sidebarFooter.innerHTML = `
      <div class="auth-hint">চ্যাট হিস্ট্রি সংরক্ষণ করতে Google দিয়ে সাইন-ইন করুন।</div>
      <button class="auth-btn" onclick="handleAuthClick()">Google দিয়ে সাইন-ইন</button>
    `;
  }

  function signOut(){
    if (accessToken) {
      try { google.accounts
