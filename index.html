<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium AI English Teacher</title>
    <style>
        :root {
            --gold: #D4AF37;
            --black: #000000;
            --dark-gray: #1a1a1a;
            --text-color: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--black); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        header { background: linear-gradient(135deg, #000, #332700); color: var(--gold); padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); font-weight: bold; font-size: 22px; }

        /* Chat Area */
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 18px; border-radius: 15px; font-size: 16px; }
        .user { background-color: var(--gold); color: #000; align-self: flex-end; border-bottom-right-radius: 0; }
        .ai { background-color: var(--dark-gray); color: var(--text-color); align-self: flex-start; border: 1px solid var(--gold); border-bottom-left-radius: 0; }

        /* Controls */
        .controls { padding: 20px; display: flex; flex-direction: column; align-items: center; background: #050505; border-top: 1px solid #333; }
        .record-btn { width: 70px; height: 70px; border-radius: 50%; background: var(--gold); border: none; font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .record-btn.recording { animation: blink 1s infinite; background: #ff0000; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .status { margin-top: 10px; color: var(--gold); font-size: 14px; }
    </style>
</head>
<body>

    <header>AI Spoken English Teacher</header>

    <div class="chat-container" id="chatContainer">
        <div class="message ai">হ্যালো! আমি তোমার পার্সোনাল ইংলিশ টিচার। কথা বলতে নিচে গোল্ডেন বাটনে ক্লিক করো।</div>
    </div>

    <div class="controls">
        <button class="record-btn" id="recordBtn">🎤</button>
        <div class="status" id="statusText">শুরু করতে ক্লিক করুন</div>
    </div>

    <script>
        const BACKEND_URL = "https://ai-teacher-backend-otc2.onrender.com";
        const recordBtn = document.getElementById('recordBtn');
        const statusText = document.getElementById('statusText');
        const chatContainer = document.getElementById('chatContainer');

        let mediaRecorder;
        let chunks = [];
        let isRecording = false;

        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                // START RECORDING
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/wav' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => sendAudio(reader.result.split(',')[1]);
                };
                mediaRecorder.start();
                isRecording = true;
                recordBtn.classList.add('recording');
                statusText.innerText = "শুনছি...";
            } else {
                // STOP RECORDING
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.classList.remove('recording');
                statusText.innerText = "প্রসেস হচ্ছে...";
            }
        });

        async function sendAudio(base64Audio) {
            try {
                const res = await fetch(`${BACKEND_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ audio_base64: base64Audio })
                });
                const data = await res.json();
                if(data.success) {
                    appendMessage(data.user_said, 'user');
                    appendMessage(data.ai_response, 'ai');
                    statusText.innerText = "আবার বলুন...";
                }
            } catch(e) {
                alert("সার্ভার এরর!");
            }
        }

        function appendMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
  </html>
